<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Address | CORE STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FAF9F6; color: #3E2723; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(62, 39, 35, 0.08); }
        input:focus, select:focus { border-color: #00796B !important; background: white !important; outline: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <main class="max-w-2xl w-full animate__animated animate__fadeIn">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <a href="{% url 'user_addresses' %}" class="text-[10px] font-black uppercase tracking-widest text-[#00796B] hover:text-[#3E2723] mb-2 block">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Back to Addresses
                </a>
                <h1 class="text-3xl font-black text-[#3E2723] tracking-tighter uppercase italic">
                    Edit <span class="text-[#00796B]">Location</span>
                </h1>
            </div>
        </div>

        <div class="glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl relative overflow-hidden">
            <form method="POST" class="space-y-6 relative z-10">
                {% csrf_token %}
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[9px] font-black uppercase tracking-widest text-[#3E2723]/40 ml-1">Recipient Name</label>
                        <input type="text" name="full_name" value="{{ address.full_name }}" required 
                               class="w-full bg-white border border-[#3E2723]/10 rounded-2xl px-6 py-4 text-xs font-black text-[#3E2723]">
                    </div>

                    <div class="space-y-2">
                        <label class="text-[9px] font-black uppercase tracking-widest text-[#3E2723]/40 ml-1">Contact Number</label>
                        <input type="tel" name="phone_number" value="{{ address.phone_number }}" required 
                               class="w-full bg-white border border-[#3E2723]/10 rounded-2xl px-6 py-4 text-xs font-black text-[#3E2723]">
                    </div>

                    <div class="md:col-span-2 space-y-2">
                        <label class="text-[9px] font-black uppercase tracking-widest text-[#3E2723]/40 ml-1">House / Flat / Building</label>
                        <input type="text" name="house_info" value="{{ address.house_info }}" required 
                               class="w-full bg-white border border-[#3E2723]/10 rounded-2xl px-6 py-4 text-xs font-black text-[#3E2723]">
                    </div>

                    <div class="space-y-2">
                        <label class="text-[9px] font-black uppercase tracking-widest text-[#3E2723]/40 ml-1">Locality / Street</label>
                        <input type="text" name="locality" value="{{ address.locality }}" required 
                               class="w-full bg-white border border-[#3E2723]/10 rounded-2xl px-6 py-4 text-xs font-black text-[#3E2723]">
                    </div>

                    <div class="space-y-2">
                        <label class="text-[9px] font-black uppercase tracking-widest text-[#3E2723]/40 ml-1">Landmark</label>
                        <input type="text" name="landmark" value="{{ address.landmark }}" 
                               class="w-full bg-white border border-[#3E2723]/10 rounded-2xl px-6 py-4 text-xs font-black text-[#3E2723]">
                    </div>

                    <div class="space-y-2">
                        <label class="text-[9px] font-black uppercase tracking-widest text-[#3E2723]/40 ml-1">Pincode</label>
                        <input type="text" name="pincode" value="{{ address.pincode }}" required 
                               class="w-full bg-white border border-[#3E2723]/10 rounded-2xl px-6 py-4 text-xs font-black text-[#3E2723]">
                    </div>

                    <div class="space-y-2">
                        <label class="text-[9px] font-black uppercase tracking-widest text-[#3E2723]/40 ml-1">City</label>
                        <input type="text" name="city" value="{{ address.city }}" required 
                               class="w-full bg-white border border-[#3E2723]/10 rounded-2xl px-6 py-4 text-xs font-black text-[#3E2723]">
                    </div>

                    <div class="space-y-2">
                        <label class="text-[9px] font-black uppercase tracking-widest text-[#3E2723]/40 ml-1">State</label>
                        <input type="text" name="state" value="{{ address.state }}" required 
                               class="w-full bg-white border border-[#3E2723]/10 rounded-2xl px-6 py-4 text-xs font-black text-[#3E2723]">
                    </div>

                    <div class="space-y-2">
                        <label class="text-[9px] font-black uppercase tracking-widest text-[#3E2723]/40 ml-1">Address Type</label>
                        <select name="address_type" class="w-full bg-white border border-[#3E2723]/10 rounded-2xl px-6 py-4 text-xs font-black text-[#3E2723] appearance-none">
                            <option value="HOME" {% if address.address_type == 'HOME' %}selected{% endif %}>HOME</option>
                            <option value="WORK" {% if address.address_type == 'WORK' %}selected{% endif %}>WORK</option>
                        </select>
                    </div>
                </div>

                <div class="flex items-center gap-3 pt-4">
                    <input type="checkbox" name="is_default" id="is_default" class="w-5 h-5 accent-[#00796B]" {% if address.is_default %}checked{% endif %}>
                    <label for="is_default" class="text-[10px] font-black uppercase tracking-widest text-[#3E2723]">Primary Address</label>
                </div>

                <div class="pt-8 flex flex-col md:flex-row gap-4">
                    <button type="submit" class="flex-1 bg-[#3E2723] text-white px-8 py-5 rounded-[1.5rem] font-black uppercase text-[10px] tracking-widest hover:bg-[#00796B] transition-all">
                        Update Details
                    </button>
                    <a href="{% url 'user_addresses' %}" class="flex-1 bg-white text-[#3E2723]/40 px-8 py-5 rounded-[1.5rem] font-black uppercase text-[10px] tracking-widest text-center border border-[#3E2723]/5">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
