<div class="flex items-center gap-2 pt-1">
  
  <div class="relative group/rating inline-block">
    
    <div class="{% if product.review_count > 0 %}bg-amber-500{% else %}bg-gray-400{% endif %} text-white px-1.5 py-[2px] rounded-[3px] text-[11px] font-bold flex items-center gap-1 cursor-pointer w-max">
      {{ product.avg_rating|floatformat:1|default:"0" }}
      <i class="fas fa-star text-[8px]"></i>
    </div>

    <div class="absolute bottom-full left-0 mb-2 hidden group-hover/rating:block w-48 bg-white text-gray-800 border border-gray-200 shadow-2xl rounded-md z-[100] p-3 cursor-default">
      
      <div class="flex items-center gap-3 mb-2 border-b pb-2">
        <div class="text-2xl font-light flex items-center gap-1">
          {{ product.avg_rating|floatformat:1|default:"0" }} <i class="fas fa-star text-sm text-gray-300"></i>
        </div>
        <div class="text-[10px] leading-tight text-gray-500 flex flex-col gap-0.5">
          <span><strong class="text-gray-700">{{ product.review_count|default:"0" }}</strong> Ratings</span>
          <span><strong class="text-gray-700">{{ product.review_count|default:"0" }}</strong> Reviews</span>
        </div>
      </div>

      <div class="flex flex-col gap-1 text-[10px] text-gray-600 font-medium">
        
        <div class="flex items-center gap-1.5">
          <span class="w-3 flex justify-between items-center">5 <i class="fas fa-star text-[6px] text-gray-400"></i></span>
          <div class="flex-1 h-1 bg-gray-200 rounded-full overflow-hidden">
            <div class="h-full bg-green-500" 
                 style="width: {% if product.review_count > 0 %}{% widthratio product.star_5 product.review_count 100 %}{% else %}0{% endif %}%;">
            </div>
          </div>
        </div>

        <div class="flex items-center gap-1.5">
          <span class="w-3 flex justify-between items-center">4 <i class="fas fa-star text-[6px] text-gray-400"></i></span>
          <div class="flex-1 h-1 bg-gray-200 rounded-full overflow-hidden">
            <div class="h-full bg-green-500" 
                 style="width: {% if product.review_count > 0 %}{% widthratio product.star_4 product.review_count 100 %}{% else %}0{% endif %}%;">
            </div>
          </div>
        </div>

        <div class="flex items-center gap-1.5">
          <span class="w-3 flex justify-between items-center">3 <i class="fas fa-star text-[6px] text-gray-400"></i></span>
          <div class="flex-1 h-1 bg-gray-200 rounded-full overflow-hidden">
            <div class="h-full bg-green-500" 
                 style="width: {% if product.review_count > 0 %}{% widthratio product.star_3 product.review_count 100 %}{% else %}0{% endif %}%;">
            </div>
          </div>
        </div>

        <div class="flex items-center gap-1.5">
          <span class="w-3 flex justify-between items-center">2 <i class="fas fa-star text-[6px] text-gray-400"></i></span>
          <div class="flex-1 h-1 bg-gray-200 rounded-full overflow-hidden">
            <div class="h-full bg-yellow-500" 
                 style="width: {% if product.review_count > 0 %}{% widthratio product.star_2 product.review_count 100 %}{% else %}0{% endif %}%;">
            </div>
          </div>
        </div>

        <div class="flex items-center gap-1.5">
          <span class="w-3 flex justify-between items-center">1 <i class="fas fa-star text-[6px] text-gray-400"></i></span>
          <div class="flex-1 h-1 bg-gray-200 rounded-full overflow-hidden">
            <div class="h-full bg-red-500" 
                 style="width: {% if product.review_count > 0 %}{% widthratio product.star_1 product.review_count 100 %}{% else %}0{% endif %}%;">
            </div>
          </div>
        </div>

      </div>
      
    </div>
  </div>

  <span class="text-[11px] text-slate-500 font-medium tracking-wide">
    ({{ product.review_count|default:"0" }})
  </span>

</div>
